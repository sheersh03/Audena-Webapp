<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Audena Enterprise AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Outfit:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6", // Glauco-inspired blue highlight
                        "background-light": "#F2F4F7", // Porcelain background
                        "background-dark": "#0A0A0A", // Deep black for dark mode
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#161616",
                    },
                    fontFamily: {
                        display: ["Outfit", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .display-font {
            font-family: 'Outfit', sans-serif;
        }.focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col transition-colors duration-300">
<main class="flex-grow flex flex-col items-center justify-center p-6 sm:p-12">
<div class="mb-10 flex flex-col items-center">
<a href="/" class="flex items-center gap-2 mb-2 group">
<div class="w-10 h-10 bg-black dark:bg-white rounded-xl flex items-center justify-center">
<span class="material-icons-round text-white dark:text-black text-[24px]">graphic_eq</span>
</div>
<h1 class="text-3xl font-semibold tracking-tight display-font text-gray-900 dark:text-white">Audena</h1>
</a>
<p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Enterprise AI Voice Platform</p>
</div>
<div class="w-full max-w-[440px] bg-white dark:bg-surface-dark p-8 sm:p-10 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-[0_8px_30px_rgb(0,0,0,0.08)]">
<div class="text-center mb-8">
<h2 class="text-2xl font-medium text-gray-400 dark:text-gray-500 mb-2 font-display-outfit">Welcome back</h2>
<p class="text-sm text-gray-700 dark:text-gray-300">Please enter your details to sign in.</p>
</div>
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors" type="button">
<svg class="w-5 h-5" viewBox="0 0 23 23">
<path d="M0 0h23v23H0z" fill="#f3f3f3"></path>
<path d="M1 1h10v10H1z" fill="#f35325"></path>
<path d="M12 1h10v10H12z" fill="#81bc06"></path>
<path d="M1 12h10v10H1z" fill="#05a6f0"></path>
<path d="M12 12h10v10H12z" fill="#ffba08"></path>
</svg>
                    Continue with Microsoft
                </button>
</div>
<div class="relative mb-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-gray-800"></div>
</div>
<div class="relative flex justify-center text-sm uppercase">
<span class="px-2 bg-white dark:bg-surface-dark text-gray-400 text-xs uppercase tracking-wide">or use email</span>
</div>
</div>
<form action="/login" method="post" class="space-y-5" id="login-form">
<div>
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5" for="email">Email address</label>
<input class="w-full px-4 py-2.5 bg-gray-600 dark:bg-gray-700 border-0 rounded-lg text-white placeholder-gray-300 focus:ring-2 focus:ring-blue-500 focus:ring-offset-0 block sm:text-sm transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-300" for="password">Password</label>
<a class="text-xs font-medium text-blue-500 hover:underline" href="/forgot-password">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-2.5 bg-gray-600 dark:bg-gray-700 border-0 rounded-lg text-white placeholder-gray-300 focus:ring-2 focus:ring-blue-500 focus:ring-offset-0 block sm:text-sm transition-all pr-10" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-300 hover:text-white" type="button" id="password-toggle" aria-label="Toggle password visibility">
<span class="material-icons-round text-lg">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 text-blue-500 focus:ring-blue-500 border-gray-300 rounded bg-white" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-600 dark:text-gray-400" for="remember-me">
                        Stay signed in for 30 days
                    </label>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg text-sm font-semibold text-white bg-blue-500 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200" type="submit">
                    Sign In
                </button>
</form>
<p class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400">
                Don't have an account? 
                <a class="font-semibold text-blue-500 hover:underline" href="/book-demo">Request access</a>
</p>
</div>
<div class="mt-12 flex gap-6 text-xs text-gray-400 dark:text-gray-600 font-medium uppercase tracking-wider">
<a class="hover:text-gray-600 dark:hover:text-gray-400 transition-colors" href="/about">Privacy Policy</a>
<a class="hover:text-gray-600 dark:hover:text-gray-400 transition-colors" href="/about">Terms of Service</a>
<a class="hover:text-gray-600 dark:hover:text-gray-400 transition-colors" href="#">System Status</a>
</div>
</main>

</body></html>
